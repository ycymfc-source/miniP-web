<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>miniP 中国官网</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: #f5f5f5;
      color: #111;
      font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", Arial, sans-serif;
    }

    .wrap {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .header {
      padding: 28px 32px 0;
    }

    .header img {
      height: 42px;
      width: auto;
      display: block;
    }

    .main {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 40px 20px 80px;
    }

    .content {
      max-width: 720px;
    }

    h1 {
      margin: 0;
      font-size: 56px;
      line-height: 1.25;
      font-weight: 700;
      letter-spacing: 0.02em;
    }

    p.sub {
      margin: 24px 0 0;
      font-size: 20px;
      color: #666;
      line-height: 1.8;
    }

    p.footer {
      margin: 100px 0 0;
      font-size: 14px;
      color: #999;
      letter-spacing: 0.06em;
    }

    @media (max-width: 768px) {
      .header {
        padding: 20px 20px 0;
      }

      .header img {
        height: 34px;
      }

      .main {
        padding: 24px 20px 60px;
      }

      h1 {
        font-size: 42px;
      }

      p.sub {
        font-size: 18px;
        margin-top: 18px;
      }

      p.footer {
        margin-top: 72px;
        font-size: 13px;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="header">
     <img src="./logo.png.png" alt="miniP Logo">
    </div>

    <main class="main">
      <div class="content">
        <h1>即将公开<br>敬请期待</h1>
        <p class="sub">MiniP 正在筹备中国地区发布</p>
        <p class="footer">MiniP — Designed in Kyoto</p>
      </div>
    </main>
  </div>
</body>
</html>
